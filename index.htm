# certificate-system
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Registration - KPR College</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="certificate-box">
            <!-- Header -->
            <div class="header">
                <div class="logo-section">
                    <div class="logo">KPR</div>
                    <div class="college-name">KPR College of Arts Science and Research</div>
                </div>
            </div>

            <!-- Form Section -->
            <div class="form-section">
                <h1>Get Your Certificate</h1>
                <p class="subtitle">Only Registered Students - Enter Your Email to Verify & Download</p>

                <form id="certificateForm">
                    <div class="form-group">
                        <label for="email">Email Address:</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="Enter your registered email"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="name">Full Name:</label>
                        <input 
                            type="text" 
                            id="name" 
                            name="name" 
                            placeholder="Enter your full name"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="rollno">Roll Number:</label>
                        <input 
                            type="text" 
                            id="rollno" 
                            name="rollno" 
                            placeholder="Enter your roll number"
                            required
                        >
                    </div>

                    <button type="submit" class="btn-submit">Verify & Get Certificate</button>
                </form>

                <!-- Message Display -->
                <div id="message" class="message"></div>
                <div id="downloadLink" class="download-link"></div>
            </div>

            <!-- Footer -->
            <div class="footer">
                <p>Department of Computer Applications</p>
                <p>Arasur, Coimbatore</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
